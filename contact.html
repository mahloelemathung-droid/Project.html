<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <title>Contact - Hope for All Shelter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Contact Hope for All Shelter</h1>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="homepage">Homepage</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="services.html">Services</a></li>
        </ul>
    </nav>
    <main>
        <section>
            <h2>Get in Touch</h2>
             <p>Hope for All Shelter</p>
    <p>Polokwane, South Africa</p>
    <p>+27 607802515</p>
    <p>info@hopeforall.org</p>
            <img src="shelter 1.png" alt="Shelter team" style="max-width: 100%; height: auto;">
        </section>

<form id="contactForm"
action="mailto:info@hopeforall.org"
method="post"
enctype="text/plain">

<label>Full Name:</label><br>
<input type="text"
id="fullname"
required><br><br>

<label>Email:</label><br>
<input type="email"
id="contactEmail"
required><br><br>

<label>Message Type:</label><br>

<select required>
<option>General Enquiry</option>
<option>Complaint</option>
<option>Suggestion</option>
<option>Volunteer Request</option>
</select>

<br><br>

<label>Message:</label><br>

<textarea
rows="6"
cols="40"
required>
</textarea>

<br><br>

<button type="submit">
Send Message
</button>

</form>

    </main>
    <footer>
        <p>&copy; 2026 Hope for All Shelter</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
